<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canton LocalNet — 멀티뷰 대시보드</title>
<style>
  :root { --bar:#1f2430; --bar2:#2a3140; --fg:#e6e9ef; --accent:#7aa2f7; --ok:#9ece6a; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#0d1017; color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  #toolbar { display:flex; align-items:center; gap:12px; padding:8px 12px;
    background:var(--bar); border-bottom:1px solid #000; flex-wrap:wrap; }
  #toolbar b { color:var(--accent); }
  #toolbar .dot { color:var(--ok); }
  #toolbar select, #toolbar button { background:var(--bar2); color:var(--fg);
    border:1px solid #3a4252; border-radius:6px; padding:4px 10px; font-size:13px; cursor:pointer; }
  #toolbar button:hover, #toolbar select:hover { border-color:var(--accent); }
  #grid { display:grid; gap:6px; padding:6px; height:calc(100% - 45px);
    grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); }
  .pane { display:flex; flex-direction:column; background:var(--bar2);
    border:1px solid #3a4252; border-radius:8px; overflow:hidden; min-height:0; }
  .pane.hidden { display:none; }
  .pane header { display:flex; align-items:center; gap:8px; padding:5px 8px;
    background:var(--bar); font-size:12px; border-bottom:1px solid #000; }
  .pane header .name { font-weight:600; color:var(--accent); white-space:nowrap; }
  .pane header .who { color:#8a93a5; }
  .pane header .who code { background:#0d1017; padding:1px 5px; border-radius:4px; color:var(--ok); }
  .pane header .spacer { flex:1; }
  .pane header a, .pane header button { color:#8a93a5; text-decoration:none; font-size:12px;
    background:none; border:none; cursor:pointer; padding:2px 4px; }
  .pane header a:hover, .pane header button:hover { color:var(--fg); }
  .pane iframe { flex:1; width:100%; border:none; background:#fff; }
  .pane .noframe { flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; text-align:center; padding:16px; color:#8a93a5; }
  .pane .noframe p { margin:0; font-size:13px; max-width:240px; line-height:1.5; }
  .pane .noframe a { color:var(--accent); font-size:15px; font-weight:600; text-decoration:none;
    border:1px solid var(--accent); border-radius:8px; padding:8px 16px; }
  .pane .noframe a:hover { background:var(--accent); color:#0d1017; }
</style>
</head>
<body>
<div id="toolbar">
  <b>Canton LocalNet</b> <span class="dot">●</span>
  <span style="color:#8a93a5">레이아웃</span>
  <select id="layout">
    <option value="2x2" selected>2×2 (4분할)</option>
    <option value="2x1">2×1 (좌우)</option>
    <option value="1x1">1×1 (단일)</option>
  </select>
  <span id="picker" style="display:none; gap:6px;"></span>
  <button id="reloadAll">전체 새로고침 ⟳</button>
  <span style="flex:1"></span>
  <span style="color:#8a93a5; font-size:12px">로그인: 이름만 입력, 비밀번호 없음 (인증 OFF)</span>
</div>
<div id="grid"></div>

<script>
const PANES = [
  { id:'scan',     name:'Scan',          url:'http://scan.localhost:4000',          who:'익스플로러(로그인 없음)' },
  { id:'wprov',    name:'Wallet · Provider', url:'http://wallet.localhost:3000',     who:'login: <code>app-provider</code>' },
  { id:'wuser',    name:'Wallet · User',  url:'http://wallet.localhost:2000',        who:'login: <code>app-user</code>' },
  { id:'sv',       name:'SV Interface',   url:'http://sv.localhost:4000',            who:'login: <code>sv</code>' },
];
const LAYOUTS = {
  '2x2': { cols:2, rows:2, n:4 },
  '2x1': { cols:2, rows:1, n:2 },
  '1x1': { cols:1, rows:1, n:1 },
};
const grid = document.getElementById('grid');
const layoutSel = document.getElementById('layout');
const picker = document.getElementById('picker');

// 단일/좌우 레이아웃일 때 어떤 패널을 보일지 선택
let selection = ['scan','wprov','wuser','sv'];

function buildPanes() {
  grid.innerHTML = '';
  PANES.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pane'; el.dataset.id = p.id;
    const body = p.noframe
      ? `<div class="noframe">
           <p>이 페이지는 보안 정책(X-Frame-Options)으로 격자 안에 넣을 수 없어요.</p>
           <a href="${p.url}" target="_blank">↗ 새 탭에서 열기</a>
         </div>`
      : `<iframe src="${p.url}" loading="lazy"></iframe>`;
    el.innerHTML = `
      <header>
        <span class="name">${p.name}</span>
        <span class="who">${p.who}</span>
        <span class="spacer"></span>
        ${p.noframe ? '' : '<button title="새로고침" data-act="reload">⟳</button>'}
        <a href="${p.url}" target="_blank" title="새 탭에서 열기">↗</a>
      </header>
      ${body}`;
    const rl = el.querySelector('[data-act=reload]');
    if (rl) rl.onclick = () => { const f = el.querySelector('iframe'); f.src = f.src; };
    grid.appendChild(el);
  });
}

function applyLayout() {
  const L = LAYOUTS[layoutSel.value];
  grid.style.gridTemplateColumns = `repeat(${L.cols},1fr)`;
  grid.style.gridTemplateRows = `repeat(${L.rows},1fr)`;
  const visible = selection.slice(0, L.n);
  document.querySelectorAll('.pane').forEach(el => {
    el.classList.toggle('hidden', !visible.includes(el.dataset.id));
  });
  // 패널 선택 드롭다운 (단일/좌우/4분할에서 노출)
  picker.style.display = L.n < PANES.length ? 'inline-flex' : 'none';
  picker.innerHTML = '';
  if (L.n < PANES.length) {
    for (let i=0;i<L.n;i++) {
      const sel = document.createElement('select');
      PANES.forEach(p => {
        const o = document.createElement('option');
        o.value=p.id; o.textContent=p.name; if (p.id===visible[i]) o.selected=true;
        sel.appendChild(o);
      });
      sel.onchange = () => { selection[i]=sel.value; applyLayout(); };
      picker.appendChild(sel);
    }
  }
}

document.getElementById('reloadAll').onclick = () =>
  document.querySelectorAll('iframe').forEach(f => f.src = f.src);
layoutSel.onchange = applyLayout;

buildPanes();
applyLayout();
</script>
</body>
</html>
