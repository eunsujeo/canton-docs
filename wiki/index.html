<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canton 한국어 위키</title>
  <meta name="description" content="Canton Network 공식 문서 한국어 번역 — 개발자용 지식베이스" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6/themes/light-border.css" />
  <style>
    :root { --theme-color: #2c5fff; }
    .sidebar { font-size: 14.5px; }
    .markdown-section { max-width: 880px; }
    /* mermaid 다이어그램 기본: 폭에 맞춰 축소 (pan-zoom 미적용 시) */
    .mermaid { text-align: center; }
    .mermaid svg { max-width: 100%; height: auto; }
    /* pan-zoom 적용 시: 고정 높이 박스 안에 전체를 fit, 휠 줌/드래그 */
    .mermaid.zoom-box {
      height: 75vh; max-height: 700px; min-height: 360px;
      border: 1px solid #e3e3e3; border-radius: 8px; background: #fff;
      overflow: hidden; resize: vertical;
    }
    .mermaid.zoom-box svg { max-width: none; width: 100%; height: 100%; cursor: grab; }
    /* 용어 tooltip: 점선 밑줄 + 도움 커서 */
    abbr.gloss { text-decoration: underline dotted; text-underline-offset: 3px; cursor: help; }
    /* 마크다운 원본 보기 버튼 + 오버레이 */
    .md-view-btn {
      position: fixed; right: 18px; bottom: 18px; z-index: 1500;
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      background: var(--theme-color); color: #fff; border: none; border-radius: 20px;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .md-view-btn:hover { filter: brightness(1.07); }
    .md-view-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,.5); display: flex;
    }
    .md-view-box {
      margin: auto; background: #fff; width: min(920px, 94vw); height: 86vh;
      display: flex; flex-direction: column; border-radius: 10px; overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .md-view-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid #eee; background: #fafafa;
    }
    .md-view-bar .md-view-path { flex: 1; font-size: 12px; color: #666;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .md-view-bar button {
      padding: 5px 12px; font-size: 12px; border: 1px solid #ddd;
      background: #fff; border-radius: 6px; cursor: pointer;
    }
    .md-view-bar button:hover { background: #f0f0f0; }
    .md-view-box pre {
      margin: 0; flex: 1; overflow: auto; padding: 16px; background: #f8f8f8;
    }
    .md-view-box pre code {
      white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.55;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중…</div>
  <script>
    window.$docsify = {
      name: 'Canton 한국어 위키',
      repo: '',
      homepage: 'how-to-read.md',
      loadSidebar: true,
      subMaxLevel: 2,
      maxLevel: 4,
      auto2top: true,
      relativePath: true,
      notFoundPage: true,
      search: { paths: 'auto', placeholder: '검색…', noData: '결과 없음', depth: 4 },
      copyCode: { buttonText: '복사', successText: '복사됨' },
      // 코드펜스 ```mermaid 를 <div class="mermaid">로 변환
      markdown: {
        renderer: {
          code: function (code, lang) {
            if ((lang || '').trim().split(/\s+/)[0] === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function (hook) {
          // 페이지가 그려질 때마다: 용어 tooltip 초기화 + mermaid 렌더 + pan/zoom
          hook.doneEach(function () {
            attachTooltips();
            if (!window.mermaid) return;
            try {
              window.mermaid.run({ querySelector: '.mermaid' }).then(attachZoom).catch(function(){});
            } catch (e) {
              try { window.mermaid.init(undefined, '.mermaid'); } catch (e2) {}
              setTimeout(attachZoom, 300);
            }
          });
        },
        // 📄 마크다운 원본 보기: 버튼을 누르면 현재 페이지의 .md 원문을 오버레이로 표시
        function (hook, vm) {
          hook.doneEach(function () {
            // 페이지 이동 시 열려 있던 오버레이는 닫는다
            var old = document.getElementById('md-view-overlay');
            if (old) old.remove();
            if (document.getElementById('md-view-btn')) return;
            var btn = document.createElement('button');
            btn.id = 'md-view-btn';
            btn.className = 'md-view-btn';
            btn.textContent = '📄 마크다운';
            btn.title = '이 페이지의 원본 마크다운 보기';
            btn.onclick = function () {
              var exist = document.getElementById('md-view-overlay');
              if (exist) { exist.remove(); return; }
              var file = vm.route.file;
              fetch(file).then(function (r) { return r.text(); }).then(function (text) {
                var ov = document.createElement('div');
                ov.id = 'md-view-overlay';
                ov.className = 'md-view-overlay';
                ov.onclick = function (e) { if (e.target === ov) ov.remove(); };
                var box = document.createElement('div'); box.className = 'md-view-box';
                var bar = document.createElement('div'); bar.className = 'md-view-bar';
                var path = document.createElement('span'); path.className = 'md-view-path'; path.textContent = file;
                var copy = document.createElement('button'); copy.textContent = '복사';
                copy.onclick = function () {
                  navigator.clipboard.writeText(text).then(function () {
                    copy.textContent = '복사됨'; setTimeout(function () { copy.textContent = '복사'; }, 1500);
                  });
                };
                var close = document.createElement('button'); close.textContent = '✕ 닫기';
                close.onclick = function () { ov.remove(); };
                bar.appendChild(path); bar.appendChild(copy); bar.appendChild(close);
                var pre = document.createElement('pre');
                var code = document.createElement('code'); code.textContent = text;
                pre.appendChild(code);
                box.appendChild(bar); box.appendChild(pre); ov.appendChild(box);
                document.body.appendChild(ov);
              }).catch(function () {
                alert('마크다운 원문을 불러오지 못했습니다: ' + file);
              });
            };
            document.body.appendChild(btn);
          });
        }
      ]
    };

    // 용어(abbr.gloss)에 tippy 툴팁 부착 (title 속성을 내용으로 사용)
    function attachTooltips() {
      if (!window.tippy) return;
      window.tippy('abbr.gloss', {
        theme: 'light-border', allowHTML: false, maxWidth: 320,
        delay: [120, 0], placement: 'top'
      });
    }

    // 각 mermaid SVG에 마우스 휠 줌 + 드래그 이동
    function attachZoom() {
      if (!window.svgPanZoom) return;
      document.querySelectorAll('.mermaid svg').forEach(function (svg) {
        if (svg.dataset.zoomReady) return;
        svg.dataset.zoomReady = '1';
        var box = svg.closest('.mermaid');
        if (box) box.classList.add('zoom-box');
        // pan-zoom이 박스 안에 채워 넣도록 고정 크기 제거
        svg.removeAttribute('height');
        svg.setAttribute('width', '100%');
        svg.style.height = '100%';
        try {
          var pz = svgPanZoom(svg, {
            zoomEnabled: true, controlIconsEnabled: true,
            fit: true, center: true, minZoom: 0.2, maxZoom: 12
          });
          window.addEventListener('resize', function () {
            pz.resize(); pz.fit(); pz.center();
          });
        } catch (e) {}
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <!-- mermaid v10 (UMD) + 다이어그램 줌/이동 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <!-- 용어 tooltip (popper 포함 번들) -->
  <script src="https://cdn.jsdelivr.net/npm/tippy.js@6/dist/tippy-bundle.umd.min.js"></script>
  <script>window.mermaid && mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });</script>
</body>
</html>
